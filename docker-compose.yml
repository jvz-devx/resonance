services:
  pot-server:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped

  bot:
    build: .
    env_file: .env
    depends_on:
      - redis
      - pot-server
    restart: unless-stopped

  # Redis for queue persistence (optional — bot works without it, just loses queue on restart)
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
